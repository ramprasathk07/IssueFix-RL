# config_sft.yaml — Kaggle 2x T4 (15GB each)

# ========== Model Parameters ==========
model_params:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  model_type: "AutoModelForCausalLM"
  trust_remote_code: true

  # Quantization — keep false for multi-GPU DDP (bitsandbytes incompatible with DDP wrapping)
  # Re-enable load_in_4bit only for single-GPU inference/training
  load_in_8bit: false
  load_in_4bit: false
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

  # LoRA (optional)
  use_lora: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj


# ========== DataLoader Parameters ==========
dataloader_params:
  batch_size: 4                         # per-GPU; 2 GPUs x 4 x 8 grad_acc = 64 effective
  max_length: 2048                      # safe for 15GB T4 with gradient_checkpointing
  shuffle: true
  num_workers: 2                        # Kaggle is CPU-limited
  prefetch_factor: 2
  pin_memory: true
  pre_tokenize: true

# ========== Training Hyperparameters ==========
training_params:
  # Optimization
  learning_rate: 2e-5
  lr_scheduler: "cosine"
  warmup_steps: 50
  optimizer: "adamw_torch"
  weight_decay: 0.0
  max_grad_norm: 1.0

  # Training loop
  num_epochs: 3
  gradient_accumulation_steps: 8       # effective batch = 4 * 2 GPUs * 8 = 64
  num_gpus: 2

  # Mixed precision & performance
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true         # required to fit max_length=2048 in 15GB

  # Logging & checkpointing
  output_dir: "./outputs/sft_run1"
  logging_steps: 10
  save_steps: 150                       # mid-epoch resume checkpoint (only latest kept)
  eval_steps: 100
  save_best_k: 2                        # keep only the 2 best epoch checkpoints (lowest val loss)
  wandb_project: "my_sft_project_v3"
  wandb_run_name: "qwen0.5_sft_2gpu"
  mlflow_tracking_uri: null
  mlflow_experiment: "sft_training"

  # ── Kaggle Model Hub upload (best checkpoint pushed after training) ──
  push_to_kaggle: true
  # "<kaggle-username>/<model-slug>/<framework>/<variation>"
  kaggle_model_handle: "ramprasathk07/issuefix-sft/transformers/qwen0.5-sft"
  kaggle_model_license: "apache-2.0"

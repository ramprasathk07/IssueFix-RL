# config_sft.yaml
# Professional SFT configuration with clear sections

# ========== Model Parameters ==========
model_params:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  model_type: "AutoModelForCausalLM"       # AutoModelForCausalLM class
  trust_remote_code: true

  # Quantization
  load_in_8bit: false
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

  # LoRA (optional)
  use_lora: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj


# ========== DataLoader Parameters ==========
dataloader_params:
  # DataLoader behaviour
  batch_size: 2                         # per device batch size
  max_length: 5120                      # max sequence length (tokens)
  shuffle: true
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  pre_tokenize: true                    # tokenize before training (faster)

# ========== Training Hyperparameters ==========
training_params:
  # Optimization
  learning_rate: 2e-5                   # 1e-5 to 5e-5 (full) or 1e-4 to 5e-4 (LoRA)
  lr_scheduler: "cosine"                # cosine, linear, constant
  warmup_steps: 50
  optimizer: "adamw_torch"              # adamw_torch, adamw_8bit, paged_adamw_8bit
  weight_decay: 0.0
  max_grad_norm: 1.0
  label_smoothing: 0.0

  # Training loop
  num_epochs: 3
  gradient_accumulation_steps: 2        # effective batch = batch_size * grad_acc * num_gpus
  sequence_len: 5120                    # context length (can differ from max_length)

  # Mixed precision & performance
  use_amp: true
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  flash_attention: false
  grad_clip: 1.0

  # Logging & checkpointing
  output_dir: "./outputs/sft_run1"
  logging_steps: 10
  save_steps: 500
  save_total_limit: 2
  eval_steps: 100
  wandb_project: "my_sft_project_v1"
  wandb_run_name: "qwen0.5_sft_run1"

  # Distributed training
  deepspeed: null                       # path to deepspeed config (ZeRO-2/3)